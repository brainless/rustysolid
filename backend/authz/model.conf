# Authorization model version: 1
#
# Keep this file versioned in lockstep with auth-related SQL migrations in:
# - backend/migrations/sqlite
# - backend/migrations/postgres
#
# Default model mixes RBAC + ABAC:
# - RBAC via g(r.sub, p.sub)
# - ABAC via request subject attributes (r.sub_attr.*)

[request_definition]
r = sub, sub_attr, obj, act

[policy_definition]
p = sub, obj, act

[role_definition]
g = _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
m = (g(r.sub, p.sub) || r.sub == p.sub) &&
    keyMatch2(r.obj, p.obj) &&
    regexMatch(r.act, p.act) &&
    (r.sub_attr.status == "active")
